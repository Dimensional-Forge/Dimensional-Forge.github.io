name: Fetch Latest Substack Post

on:
  schedule:
    - cron: '0 14 * * *'  # Daily at 2pm UTC (10am Eastern)
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  fetch-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Substack RSS
        run: |
          curl -s -L --fail \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept: application/rss+xml, application/xml, text/xml, */*" \
            -H "Accept-Language: en-US,en;q=0.9" \
            -o feed.xml \
            https://thedimensionalforge.substack.com/feed
          echo "Feed fetched: $(wc -c < feed.xml) bytes"

      - name: Parse RSS and write JSON
        shell: python3 {0}
        run: |
          import xml.etree.ElementTree as ET
          import json
          from email.utils import parsedate_to_datetime
          from html.parser import HTMLParser

          class HTMLStripper(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self._text = []
              def handle_data(self, data):
                  self._text.append(data)
              def get_text(self):
                  return ' '.join(self._text).strip()

          def strip_html(raw):
              s = HTMLStripper()
              s.feed(raw)
              return s.get_text()

          with open('feed.xml', 'rb') as f:
              xml_data = f.read()

          root = ET.fromstring(xml_data)
          ns = {'content': 'http://purl.org/rss/1.0/modules/content/'}

          item = root.find('.//item')
          if item is None:
              print("No items found in feed")
              raise SystemExit(0)

          title = (item.findtext('title') or '').strip()
          link  = (item.findtext('link') or '').strip()
          pub   = (item.findtext('pubDate') or '').strip()

          raw_desc = (item.findtext('content:encoded', namespaces=ns)
                      or item.findtext('description')
                      or '')
          desc = strip_html(raw_desc)[:200]

          date_str = ''
          if pub:
              try:
                  dt = parsedate_to_datetime(pub)
                  date_str = dt.strftime('%b %-d, %Y')
              except Exception:
                  date_str = pub

          data = {'title': title, 'desc': desc, 'link': link, 'date': date_str}

          with open('latest-post.json', 'w') as f:
              json.dump(data, f, indent=2)

          print(f"Fetched: {title}")

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest-post.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update latest Substack post"
            git push
          fi
