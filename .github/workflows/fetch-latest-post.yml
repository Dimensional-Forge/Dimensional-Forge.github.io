name: Fetch Latest Substack Post

on:
  schedule:
    - cron: '0 14 * * *'  # Daily at 2pm UTC (10am Eastern)
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  fetch-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and parse Substack post
        shell: python3 {0}
        run: |
          import urllib.request
          import json
          from datetime import datetime
          from html.parser import HTMLParser
          from urllib.parse import quote

          class HTMLStripper(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self._text = []
              def handle_data(self, data):
                  self._text.append(data)
              def get_text(self):
                  return ' '.join(self._text).strip()

          def strip_html(raw):
              s = HTMLStripper()
              s.feed(raw)
              return s.get_text()

          rss_url = quote('https://thedimensionalforge.substack.com/feed', safe='')
          proxy_url = f'https://api.rss2json.com/v1/api.json?rss_url={rss_url}'

          with urllib.request.urlopen(proxy_url, timeout=15) as r:
              payload = json.loads(r.read())

          if payload.get('status') != 'ok' or not payload.get('items'):
              print(f"rss2json error: {payload.get('status')}")
              raise SystemExit(1)

          item = payload['items'][0]
          title = (item.get('title') or '').strip()
          link  = (item.get('link')  or '').strip()
          desc  = strip_html(item.get('description') or '')[:200]
          pub   = (item.get('pubDate') or '').strip()

          date_str = ''
          if pub:
              try:
                  dt = datetime.strptime(pub, '%Y-%m-%d %H:%M:%S')
                  date_str = dt.strftime('%b %-d, %Y')
              except Exception:
                  date_str = pub

          data = {'title': title, 'desc': desc, 'link': link, 'date': date_str}

          with open('latest-post.json', 'w') as f:
              json.dump(data, f, indent=2)

          print(f"Fetched: {title}")

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest-post.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update latest Substack post"
            git push
          fi
