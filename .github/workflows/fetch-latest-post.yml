name: Fetch Latest Substack Post

on:
  schedule:
    - cron: '0 14 * * *'  # Daily at 2pm UTC (10am Eastern)
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  fetch-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and parse Substack post
        shell: python3 {0}
        run: |
          import urllib.request
          import json
          from datetime import datetime, timezone

          url = 'https://thedimensionalforge.substack.com/api/v1/posts?limit=1'
          req = urllib.request.Request(url, headers={'Accept': 'application/json'})
          with urllib.request.urlopen(req, timeout=15) as r:
              posts = json.loads(r.read())

          if not posts:
              print("No posts returned from API")
              raise SystemExit(0)

          post = posts[0]
          title = (post.get('title') or '').strip()
          desc  = (post.get('subtitle') or '').strip()[:200]
          link  = (post.get('canonical_url') or '').strip()
          raw_date = post.get('post_date') or ''

          date_str = ''
          if raw_date:
              try:
                  dt = datetime.fromisoformat(raw_date.replace('Z', '+00:00'))
                  date_str = dt.strftime('%b %-d, %Y')
              except Exception:
                  date_str = raw_date

          data = {'title': title, 'desc': desc, 'link': link, 'date': date_str}

          with open('latest-post.json', 'w') as f:
              json.dump(data, f, indent=2)

          print(f"Fetched: {title}")

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest-post.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update latest Substack post"
            git push
          fi
