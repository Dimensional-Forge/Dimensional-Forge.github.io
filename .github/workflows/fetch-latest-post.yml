name: Fetch Latest Substack Post

on:
  schedule:
    - cron: '0 14 * * *'  # Daily at 2pm UTC (10am Eastern)
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  fetch-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and parse Substack RSS
        run: |
          python3 - <<'EOF'
          import urllib.request
          import xml.etree.ElementTree as ET
          import json
          from email.utils import parsedate_to_datetime

          url = 'https://thedimensionalforge.substack.com/feed'
          with urllib.request.urlopen(url, timeout=10) as r:
              xml_data = r.read()

          root = ET.fromstring(xml_data)
          item = root.find('.//item')
          if item is None:
              print("No items found in feed")
              exit(0)

          title = (item.findtext('title') or '').strip()
          desc  = (item.findtext('description') or '').strip()[:120]
          link  = (item.findtext('link') or '').strip()
          pub   = (item.findtext('pubDate') or '').strip()

          date_str = ''
          if pub:
              try:
                  dt = parsedate_to_datetime(pub)
                  date_str = dt.strftime('%b %-d, %Y')
              except Exception:
                  date_str = pub

          data = {'title': title, 'desc': desc, 'link': link, 'date': date_str}

          with open('latest-post.json', 'w') as f:
              json.dump(data, f, indent=2)

          print(f"Fetched: {title}")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest-post.json
          git diff --staged --quiet || git commit -m "chore: update latest Substack post"
          git push
