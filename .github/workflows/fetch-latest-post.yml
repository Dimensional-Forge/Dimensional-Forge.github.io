name: Fetch Latest Substack Post

on:
  schedule:
    - cron: '0 14 * * *'  # Daily at 2pm UTC (10am Eastern)
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  fetch-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Substack feed
        uses: Promptly-Technologies-LLC/rss-fetch-action@v2
        with:
          feed_url: 'https://thedimensionalforge.substack.com/feed'
          file_path: './feed-raw.json'

      - name: Parse feed and write latest-post.json
        shell: python3 {0}
        run: |
          import json
          from datetime import datetime

          with open('feed-raw.json') as f:
              feed = json.load(f)

          entries = feed.get('entries', [])
          if not entries:
              print("No entries found in feed")
              raise SystemExit(0)

          entry = entries[0]
          title = (entry.get('title') or '').strip()
          link  = (entry.get('link')  or '').strip()
          desc  = (entry.get('description') or '').strip()[:200]
          pub   = (entry.get('published') or '')

          date_str = ''
          if pub:
              try:
                  dt = datetime.fromisoformat(pub)
                  date_str = dt.strftime('%b %-d, %Y')
              except Exception:
                  date_str = pub

          data = {'title': title, 'desc': desc, 'link': link, 'date': date_str}

          with open('latest-post.json', 'w') as f:
              json.dump(data, f, indent=2)

          print(f"Fetched: {title}")

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest-post.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update latest Substack post"
            git push
          fi
